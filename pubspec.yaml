name: yaml_lint
description: A declarative, YAML-driven static analysis engine for Dart & Flutter.
version: 0.1.0
repository: https://github.com/frarcos/yaml_lint
issue_tracker: https://github.com/frarcos/yaml_lint/issues

environment:
  sdk: ^3.10.0

dependencies:
  # analysis_server_plugin and analyzer must move in lockstep:
  # the plugin package exact-pins a single analyzer release per version.
  #
  # We deliberately track an older analyzer line (10.0.x) so yaml_lint
  # remains installable alongside Flutter stable, which currently
  # ships `meta` from the SDK at `1.17.0`. The first analyzer that
  # bumped its `meta` floor to `^1.18.0` is `analyzer 10.0.2`; we pin
  # to `analysis_server_plugin 0.3.7` (analyzer 10.0.1) which is the
  # latest pair compatible with Flutter-stable's `meta`.
  analysis_server_plugin: 0.3.7
  analyzer: ^10.0.0
  yaml: ^3.1.2
  yaml_edit: ^2.2.0
  source_span: ^1.10.0
  path: ^1.9.0
  glob: ^2.1.2
  collection: ^1.19.0
  meta: ^1.16.0

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.6
